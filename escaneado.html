<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARROTNET // ESCANEADO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #050a0e;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  body::before {
    content: '';
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .logo { font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:900; letter-spacing:0.25em; margin-bottom:3rem; }
  .logo .carrot { color:#ff8c00; text-shadow:0 0 10px #ff8c00; }
  .logo .net { color:#00ccff; text-shadow:0 0 10px #00ccff; }
  .word {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3.5rem, 20vw, 8rem);
    font-weight: 900;
    color: #00ccff;
    text-shadow: 0 0 40px #00ccff, 0 0 80px #006688;
    letter-spacing: 0.1em;
    line-height: 1;
    animation: blink 0.7s step-end infinite;
  }
  .sub { font-size:0.7rem; color:#557755; letter-spacing:0.3em; margin-top:2rem; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
  <div class="logo"><span class="carrot">CARROT</span><span class="net">NET</span></div>
  <div class="word">ESCANEADO</div>
  <div class="sub">// QR PROCESADO POR EL SERVIDOR //</div>
</body>
</html>
